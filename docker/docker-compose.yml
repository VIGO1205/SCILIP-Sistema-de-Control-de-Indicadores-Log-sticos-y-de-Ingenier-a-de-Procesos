version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: scilip_postgres
    environment:
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: password
      POSTGRES_DB: proyectocd
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usuario -d proyectocd"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: scilip_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: scilip_api
    environment:
      DATABASE_URL: postgresql://usuario:password@postgres:5432/proyectocd?schema=public
      PORT: 4002
      JWT_SECRET: supersecretkeyforjwtchangethisinproduction
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "4002:4002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: scilip_web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4002
    ports:
      - "3002:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: