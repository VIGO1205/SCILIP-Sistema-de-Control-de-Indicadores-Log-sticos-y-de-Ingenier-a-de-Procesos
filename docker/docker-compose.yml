# Docker Compose — PRODUCCIÓN
# Uso: cd docker && docker-compose up -d --build
# Acceder en: http://localhost

services:
  # ─── Infraestructura ────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: scilip_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-usuario}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-proyectocd}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-usuario} -d ${DB_NAME:-proyectocd}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: scilip_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Backend NestJS ─────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: scilip_api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-usuario}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-proyectocd}?schema=public
      DB_HOST: postgres
      DB_USER: ${DB_USER:-usuario}
      DB_NAME: ${DB_NAME:-proyectocd}
      PORT: 4000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-cambia-esto-en-produccion-con-un-secreto-largo}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── Frontend Next.js ────────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: scilip_web
    environment:
      NODE_ENV: production
      API_URL: http://api:4000
    depends_on:
      - api
    restart: unless-stopped

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: scilip_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: